version: "3.9"

services:
  ragos:
    build:
      context: ..
      dockerfile: agentic_rag_os/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - RAGAS_HOST=0.0.0.0
      - RAGAS_PORT=8080
      - RAGAS_DEBUG=false
      - RAGAS_SECRET_KEY=${RAGAS_SECRET_KEY:-change-me-set-in-env}
      - RAGAS_GITHUB_CLIENT_ID=${RAGAS_GITHUB_CLIENT_ID:-}
      - RAGAS_GITHUB_CLIENT_SECRET=${RAGAS_GITHUB_CLIENT_SECRET:-}
      - RAGAS_GITHUB_REDIRECT_URI=${RAGAS_GITHUB_REDIRECT_URI:-http://localhost:8080/api/v1/auth/github/callback}
      - RAGAS_FRONTEND_URL=${RAGAS_FRONTEND_URL:-http://localhost:8080}
      - RAGAS_DATABASE_URL=${RAGAS_DATABASE_URL:-sqlite+aiosqlite:////app/agentic_rag_os.db}
      - RAGAS_ALLOWED_ORIGINS=["http://localhost:8080","http://localhost:3000"]
    volumes:
      - ragos_data:/app/data
      - ragos_uploads:/app/agentic_rag_os/uploads
      - ragos_db:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ragos_data:
  ragos_uploads:
  ragos_db:
