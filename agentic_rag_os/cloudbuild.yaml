steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ragos:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ragos:latest'
      - '-f'
      - 'agentic_rag_os/Dockerfile'
      - '--build-arg'
      - 'PORT=8080'
      - '.'
    id: 'build'

  # 2. Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ragos:$COMMIT_SHA'
    id: 'push-sha'
    waitFor: ['build']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ragos:latest'
    id: 'push-latest'
    waitFor: ['build']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ragos'
      - '--image=gcr.io/$PROJECT_ID/ragos:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--port=8080'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=60s'
      - '--set-env-vars=RAGAS_HOST=0.0.0.0,RAGAS_PORT=8080'
      - '--set-secrets=RAGAS_SECRET_KEY=ragas-secret-key:latest,RAGAS_GITHUB_CLIENT_ID=ragas-github-client-id:latest,RAGAS_GITHUB_CLIENT_SECRET=ragas-github-client-secret:latest'
    id: 'deploy'
    waitFor: ['push-sha']

images:
  - 'gcr.io/$PROJECT_ID/ragos:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/ragos:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
